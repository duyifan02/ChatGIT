<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="ChatGit logo">
  <defs>
    <linearGradient id="ring" x1="24" y1="24" x2="232" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34D3E8"/>
      <stop offset="0.55" stop-color="#4B8EFF"/>
      <stop offset="1" stop-color="#8752F7"/>
    </linearGradient>

    <style>
      .ink {
        stroke: #243247;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .dot {
        fill: #243247;
      }
    </style>
  </defs>

  <!-- Outer ring -->
  <circle
    cx="128"
    cy="128"
    r="103"
    stroke="url(#ring)"
    stroke-width="9"
    fill="none"
  />

  <!-- Chat bubble -->
  <path
    class="ink"
    stroke-width="9"
    d="M80 74h96a18 18 0 0 1 18 18v55a18 18 0 0 1-18 18h-55l-31 24 9-24H80a18 18 0 0 1-18-18V92a18 18 0 0 1 18-18z"
  />

  <!-- Git tree -->
  <path class="ink" stroke-width="6" d="M94 120h32"/>
  <path class="ink" stroke-width="6" d="M126 120h36"/>

  <path class="ink" stroke-width="6" d="M126 120c0-16 10-26 26-26h10"/>
  <path class="ink" stroke-width="6" d="M126 120c0 16 10 26 26 26h10"/>

  <!-- Nodes -->
  <circle class="dot" cx="94" cy="120" r="6"/>
  <circle class="dot" cx="126" cy="120" r="6"/>
  <circle class="dot" cx="162" cy="94" r="6"/>
  <circle class="dot" cx="162" cy="120" r="6"/>
  <circle class="dot" cx="162" cy="146" r="6"/>
</svg>
