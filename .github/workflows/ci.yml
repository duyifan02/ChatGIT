name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate extension build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Check version consistency
        run: npm run check:version

      - name: Build extension
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/chrome/manifest.json
          test -f dist/chrome/content.js
          test -f dist/chrome/content.css
          test -f dist/chrome/icons/logo.svg
          test -f dist/chrome/icons/icon16.png
          test -f dist/chrome/icons/icon32.png
          test -f dist/chrome/icons/icon48.png
          test -f dist/chrome/icons/icon128.png

          test -f dist/firefox/manifest.json
          test -f dist/firefox/content.js
          test -f dist/firefox/content.css
          test -f dist/firefox/icons/logo.svg
          test -f dist/firefox/icons/icon16.png
          test -f dist/firefox/icons/icon32.png
          test -f dist/firefox/icons/icon48.png
          test -f dist/firefox/icons/icon128.png

          echo "Build output verified."
